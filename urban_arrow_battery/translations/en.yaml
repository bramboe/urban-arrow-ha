configuration:
  bike_address:
    name: Bike Bluetooth address
    description: >-
      BLE address of the Bosch hub (e.g. A4:0D:BC:8A:41:D7). Leave empty to
      auto-detect, or pick the bike in the Bosch Kiox eBike sidebar panel.
  bike_model:
    name: Bike name / brand
    description: >-
      Shown as the title in the panel. Leave empty to use the bike's reported
      manufacturer (e.g. "Bosch eBike Systems"). The bike brand/model is not
      broadcast over Bluetooth, so set your own here (e.g. "Urban Arrow").
  cooldown:
    name: Read interval (seconds)
    description: Minimum seconds between battery reads while the bike is parked.
  comodule_address:
    name: Tracker module MAC
    description: >-
      COMODULE/URBANARROW tracker module MAC (for motion). Leave empty to
      auto-detect, or pick the tracker in the panel.
  motion_off_delay:
    name: Motion clear delay (seconds)
    description: Seconds of stillness before the motion sensor turns off.
  tracker_always_on:
    name: Keep tracker connected always
    description: >-
      Off (default) saves the tracker's own battery by connecting only while the
      alarm is armed. Turn on for live motion even when disarmed.
  presence_alarm:
    name: Presence alarm (out of range)
    description: >-
      Passive anti-theft, on by default. While armed, trips the alarm if the
      tracker's Bluetooth advertisement disappears (the bike is taken out of
      range). Connection-free, so it costs the module no extra battery and the
      "In range" sensor works even while disarmed. It detects the bike LEAVING
      the area, not shaking it in place (that needs the motion sensor while armed).
  ble_proxy_host:
    name: BLE proxy host (optional)
    description: >-
      Optional. IP address or .local hostname of an ESPHome Bluetooth proxy to also
      listen for the tracker from (e.g. a second spot like the shed). Extends the
      "In range" presence coverage with no extra module-battery cost. Leave empty to
      use only the local adapter.
  ble_proxy_port:
    name: BLE proxy port
    description: ESPHome native API port (default 6053).
  ble_proxy_key:
    name: BLE proxy encryption key
    description: >-
      The ESPHome device's API encryption key (noise PSK), found under Settings →
      Devices & Services → that ESPHome device → Encryption key. Required if a proxy
      host is set.
  probe_frames:
    name: COMODULE probe (developer)
    description: >-
      Developer/diagnostic only. Logs the COMODULE 155e status frames and keeps
      the tracker connected to reverse-engineer signals (e.g. the main-battery
      flag). Drains the module battery faster — leave OFF for normal use. A banner
      shows in the panel while it is on.
  adv_probe:
    name: Advertisement probe (developer)
    description: >-
      Developer/diagnostic only. Connection-free test for passive motion detection:
      logs the tracker's advertisement RATE (adverts/sec + gap spread, per 10s) and
      the FULL advertisement incl. the scan-response (active scan) whenever any field
      changes — to see if movement shows up in the advert timing or scan-response.
      No battery drain on the module, but it holds the BLE adapter, so normal reads
      and presence pause while it is on. Run it disarmed and turn it off afterwards.
  hub_probe:
    name: Hub wake-on-motion probe (developer)
    description: >-
      Developer/diagnostic only. Tests whether the Bosch HUB starts advertising when
      the bike is moved (wake-on-motion) — which would give a movement signal that
      uses the bike's big battery, not the tracker module. Passively logs the hub
      advert appearing/disappearing without connecting; pauses the normal read loop
      while on. Move the bike without pressing anything, then turn this off again.
  mqtt_host:
    name: MQTT host
    description: Optional MQTT broker override. Leave empty to use the Mosquitto add-on.
  mqtt_port:
    name: MQTT port
    description: MQTT broker port (default 1883).
  mqtt_user:
    name: MQTT username
    description: Optional MQTT username (when not using the Mosquitto add-on).
  mqtt_pass:
    name: MQTT password
    description: Optional MQTT password (when not using the Mosquitto add-on).
