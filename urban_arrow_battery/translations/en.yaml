configuration:
  bike_address:
    name: Bike Bluetooth address
    description: >-
      BLE address of the Bosch hub (e.g. A4:0D:BC:8A:41:D7). Leave empty to
      auto-detect, or pick the bike in the Bosch Kiox eBike sidebar panel.
  bike_model:
    name: Bike name / brand
    description: >-
      Shown as the title in the panel. Leave empty to use the bike's reported
      manufacturer (e.g. "Bosch eBike Systems"). The bike brand/model is not
      broadcast over Bluetooth, so set your own here (e.g. "Urban Arrow").
  cooldown:
    name: Read interval (seconds)
    description: Minimum seconds between battery reads while the bike is parked.
  comodule_address:
    name: Tracker module MAC
    description: >-
      COMODULE/URBANARROW tracker module MAC (for motion). Leave empty to
      auto-detect, or pick the tracker in the panel.
  motion_off_delay:
    name: Motion clear delay (seconds)
    description: Seconds of stillness before the motion sensor turns off.
  tracker_always_on:
    name: Keep tracker connected always
    description: >-
      Off (default) saves the tracker's own battery by connecting only while the
      alarm is armed. Turn on for live motion even when disarmed.
  probe_frames:
    name: COMODULE probe (developer)
    description: >-
      Developer/diagnostic only. Logs the COMODULE 155e status frames and keeps
      the tracker connected to reverse-engineer signals (e.g. the main-battery
      flag). Drains the module battery faster — leave OFF for normal use. A banner
      shows in the panel while it is on.
  adv_probe:
    name: Advertisement probe (developer)
    description: >-
      Developer/diagnostic only. Passively logs the COMODULE advertisement when it
      changes, to test whether movement is visible in the advert (which would allow
      battery-friendly motion detection without a connection). Passive — no battery
      drain on the module. Holds the BLE adapter, so it pauses normal reads while on.
  mqtt_host:
    name: MQTT host
    description: Optional MQTT broker override. Leave empty to use the Mosquitto add-on.
  mqtt_port:
    name: MQTT port
    description: MQTT broker port (default 1883).
  mqtt_user:
    name: MQTT username
    description: Optional MQTT username (when not using the Mosquitto add-on).
  mqtt_pass:
    name: MQTT password
    description: Optional MQTT password (when not using the Mosquitto add-on).
