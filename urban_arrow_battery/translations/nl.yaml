configuration:
  bike_address:
    name: Bluetooth-adres fiets
    description: >-
      BLE-adres van de Bosch-hub (bijv. A4:0D:BC:8A:41:D7). Leeg laten om
      automatisch te detecteren, of kies de fiets in het Bosch Kiox eBike-paneel.
  bike_model:
    name: Fietsnaam / merk
    description: >-
      Wordt als titel in het paneel getoond. Leeg laten om de door de fiets
      gerapporteerde fabrikant te gebruiken (bijv. "Bosch eBike Systems"). Het
      fietsmerk/-model wordt niet via Bluetooth verzonden, dus geef hier
      desgewenst je eigen naam op (bijv. "Urban Arrow").
  cooldown:
    name: Leesinterval (seconden)
    description: Minimaal aantal seconden tussen batterij-uitlezingen terwijl de fiets geparkeerd staat.
  comodule_address:
    name: Module-MAC tracker
    description: >-
      Module-MAC van de COMODULE/URBANARROW-tracker (voor beweging). Leeg laten
      om automatisch te detecteren, of kies de tracker in het paneel.
  motion_off_delay:
    name: Beweging-uit vertraging (seconden)
    description: Aantal seconden stilstand voordat de bewegingssensor uit gaat.
  tracker_always_on:
    name: Tracker altijd verbonden houden
    description: >-
      Uit (standaard) spaart de eigen accu van de tracker door alleen te
      verbinden wanneer het alarm scherp staat. Aan = live beweging, ook
      wanneer disarmed.
  presence_alarm:
    name: Aanwezigheids-alarm (buiten bereik)
    description: >-
      Passieve anti-diefstal, standaard aan. Als het alarm scherp staat, gaat het
      af zodra de Bluetooth-advertentie van de tracker verdwijnt (de fiets wordt uit
      bereik gehaald). Verbindingsloos, dus het kost de module geen extra accu en de
      sensor "in bereik" werkt ook als het alarm uit staat. Het detecteert dat de
      fiets de buurt VERLAAT, niet schudden ter plekke (dat vereist de
      bewegingssensor terwijl het alarm scherp staat).
  ble_proxy_host:
    name: BLE-proxy host (optioneel)
    description: >-
      Optioneel. IP-adres of .local-hostnaam van een ESPHome Bluetooth-proxy om de
      tracker óók vanaf een tweede plek te horen (bijv. de schuur). Vergroot het
      bereik van de "in bereik"-aanwezigheid zonder extra module-accu te kosten.
      Leeg laten om alleen de lokale adapter te gebruiken.
  ble_proxy_port:
    name: BLE-proxy poort
    description: ESPHome native API-poort (standaard 6053).
  ble_proxy_key:
    name: BLE-proxy encryptiesleutel
    description: >-
      De API-encryptiesleutel (noise PSK) van het ESPHome-apparaat — te vinden onder
      Instellingen → Apparaten & diensten → dat ESPHome-apparaat → Encryptiesleutel.
      Verplicht als er een proxy-host is ingevuld.
  probe_frames:
    name: COMODULE-probe (ontwikkelaar)
    description: >-
      Alleen voor ontwikkeling/diagnostiek. Logt de COMODULE 155e-statusframes en
      houdt de tracker verbonden om signalen te reverse-engineeren (bijv. de
      hoofdaccu-vlag). Laat de module-accu sneller leeglopen — laat UIT bij normaal
      gebruik. Zolang 'ie aan staat verschijnt een melding in het paneel.
  adv_probe:
    name: Advertentie-probe (ontwikkelaar)
    description: >-
      Alleen voor ontwikkeling/diagnostiek. Verbindingsloze test voor passieve
      bewegingsdetectie: logt de FREQUENTIE van de advertentie (advertenties/sec +
      spreiding, per 10s) en de VOLLEDIGE advertentie incl. scan-response (active
      scan) zodra een veld verandert — om te zien of beweging zichtbaar is in de
      timing of de scan-response. Geen extra verbruik van de module, maar houdt de
      BLE-adapter bezet (normale uitlezingen en aanwezigheid pauzeren). Draai 'm
      disarmed en zet 'm daarna weer uit.
  hub_probe:
    name: Hub wake-on-motion-probe (ontwikkelaar)
    description: >-
      Alleen voor ontwikkeling/diagnostiek. Test of de Bosch-HUB gaat adverteren
      wanneer de fiets beweegt (wake-on-motion) — dat zou een bewegingssignaal geven
      dat de grote fietsaccu gebruikt in plaats van de tracker-module. Logt passief
      het verschijnen/verdwijnen van de hub-advertentie zonder te verbinden; pauzeert
      de normale uitleeslus zolang 'ie aan staat. Beweeg de fiets zonder iets in te
      drukken, en zet 'm daarna weer uit.
  mqtt_host:
    name: MQTT-host
    description: Optionele MQTT-broker override. Leeg laten om de Mosquitto add-on te gebruiken.
  mqtt_port:
    name: MQTT-poort
    description: Poort van de MQTT-broker (standaard 1883).
  mqtt_user:
    name: MQTT-gebruikersnaam
    description: Optionele MQTT-gebruikersnaam (als je niet de Mosquitto add-on gebruikt).
  mqtt_pass:
    name: MQTT-wachtwoord
    description: Optioneel MQTT-wachtwoord (als je niet de Mosquitto add-on gebruikt).
