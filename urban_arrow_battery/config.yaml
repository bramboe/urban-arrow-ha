name: Bosch Kiox eBike
version: "2.37.2"
slug: urban_arrow_battery
description: >-
  Reads a Bosch Smart System eBike (Kiox display) over Bluetooth — battery, range
  per mode, ride mode, odometer, next service — plus motion/anti-theft alarm and
  tracker. Publishes to Home Assistant via MQTT discovery. Tested on the Urban
  Arrow Family Advanced Next; other Bosch Smart System bikes are untested but may
  also work.
url: https://github.com/bramboe/urban-arrow-ha
arch:
  - aarch64
  - amd64
init: false
# Friendly setup wizard in the HA sidebar (scan/select bike + tracker, pair).
ingress: true
ingress_port: 8099
panel_icon: mdi:bicycle-electric
panel_title: Bosch Kiox eBike
# Access the host BlueZ stack over D-Bus (needed for BLE bonding + reading).
host_dbus: true
# Read HA entity states (optional external bike-mounted motion/contact sensor).
homeassistant_api: true
# Auto-receive the MQTT broker connection details from Home Assistant.
services:
  - mqtt:want
options:
  bike_address: ""
  bike_model: ""
  cooldown: 120
  comodule_address: ""
  motion_off_delay: 12
  tracker_always_on: false
  presence_alarm: true
  ble_proxy_host: ""
  ble_proxy_port: 6053
  ble_proxy_key: ""
  pon_client_id: ""
  pon_refresh_token: ""
  pon_bike_id: ""
  pon_poll: 120
  probe_frames: false
  adv_probe: false
  hub_probe: false
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
schema:
  # Leave bike_address empty to auto-detect the hub (advertised "smart system eBike").
  bike_address: str?
  # Display name shown in the panel hero. Empty = "Urban Arrow Connected".
  bike_model: str?
  cooldown: int
  # COMODULE/URBANARROW motion tracker. Empty = auto-detect by name. Seconds of
  # stillness before motion clears.
  comodule_address: str?
  motion_off_delay: int?
  # Keep the tracker connected always (live motion when disarmed too). Default
  # off = only while armed, to save the tracker's own battery.
  tracker_always_on: bool?
  # Passive anti-theft: when armed, trip the alarm if the tracker advertisement
  # disappears (bike taken out of BLE range). Connection-free = no module drain.
  presence_alarm: bool?
  # Optional remote ESPHome Bluetooth proxy for the presence layer (extra listening
  # spot). Host = IP or .local name; key = the ESPHome device's API encryption key.
  ble_proxy_host: str?
  ble_proxy_port: int?
  ble_proxy_key: str?
  # Optional PON Connected Bike CLOUD poll (additive, no BLE): GPS location, speed,
  # module charge over the internet. Needs an OAuth app client_id + a refresh_token
  # (offline_access). bike_id optional (auto-detected). poll = seconds between polls.
  pon_client_id: str?
  pon_refresh_token: str?
  pon_bike_id: str?
  pon_poll: int?
  # TEMPORARY diagnostic: log distinct COMODULE 155e status frames to find which
  # byte flips when the main battery is removed/inserted. Keeps the tracker
  # connected (no need to arm). Turn off again after the test.
  probe_frames: bool?
  # TEMPORARY diagnostic: passively log the COMODULE advertisement when it changes
  # (to test if movement is visible in the advert). Passive — no connection.
  adv_probe: bool?
  # TEMPORARY diagnostic: passively log when the Bosch hub starts/stops advertising
  # (to test wake-on-motion). No connection; pauses the normal read loop while on.
  hub_probe: bool?
  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_pass: str?
